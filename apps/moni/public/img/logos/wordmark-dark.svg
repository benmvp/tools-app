    <!-- S-shaped dollar sign (continuous path) -->
    <path d="M 8 -10 C 8 -13 4 -15 0 -15 C -4 -15 -8 -13 -8 -10 C -8 -7 -5 -5 -2 -3 L 2 -1 C 5 1 8 3 8 6 C 8 9 4 11 0 11 C -4 11 -8 9 -8 6"
          stroke="#22C55E"
          stroke-width="2.5"
          stroke-linecap="round"
          fill="none"/>
  </g>

  <!-- MONI text -->
  <text x="40" y="38" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#22C55E">MONI</text>
</svg>
